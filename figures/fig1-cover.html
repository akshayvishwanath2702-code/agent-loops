<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="poster.css">
<style>
  .stage{justify-content:flex-start;gap:24px;padding-top:60px}
  h1.big{font-size:82px}
  .scopewrap{position:absolute;left:0;right:0;bottom:64px;height:120px;opacity:.9}
  canvas{display:block;width:100%;height:120px}
  .byline{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:4px}
</style></head>
<body>
<div class="stage" id="stage">
  <div class="brandbar"></div>
  <div class="eyebrow">Field notes · Agentic systems</div>
  <h1 class="big">Stop prompting.<br>Start building loops.</h1>
  <div class="dek">The highest-leverage engineers stopped writing prompts. They write the <span class="accent">loop</span> the model runs inside, then let it decide what to do next.</div>
  <div class="byline">
    <span class="pill"><span class="dot"></span>observe → act → verify → repeat</span>
    <span class="pill">engineering deep-dive</span>
  </div>
  <div class="scopewrap"><canvas id="c" width="2160" height="300"></canvas></div>
  <div class="footmark">Akshay Vishwanath</div>
  <div class="pagemark">01 / 07</div>
</div>
<script>
(function(){
  var cv=document.getElementById("c"),x=cv.getContext("2d"),W=cv.width,H=cv.height;
  function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
  var amber=css("--amber-glow"),teal=css("--teal-glow"),line=css("--line"),faint=css("--faint");
  var midY=H/2,amp=92,cycles=3.2,t=1.1;
  x.strokeStyle=line;x.lineWidth=2;x.beginPath();x.moveTo(0,midY);x.lineTo(W,midY);x.stroke();
  function trace(off,color,alpha,w){
    x.strokeStyle=color;x.globalAlpha=alpha;x.lineWidth=w;x.lineJoin="round";x.beginPath();
    for(var i=0;i<=W;i+=2){var p=(i/W*cycles)*Math.PI*2+off;var seg=(p/(Math.PI*2))%1;
      var spike=Math.exp(-Math.pow((seg-0.5)*7,2))*0.7;var y=midY-(Math.sin(p)*amp*0.62+spike*amp);
      if(i===0)x.moveTo(i,y);else x.lineTo(i,y);}x.stroke();x.globalAlpha=1;}
  trace(-t*0.9,teal,.3,3);
  trace(-t,amber,1,4.5);
  x.font='22px ui-monospace,Menlo,monospace';x.fillStyle=faint;x.textAlign="center";
  var labels=["OBSERVE","ACT","VERIFY","OBSERVE"];
  for(var i=0;i<4;i++){x.fillText(labels[i],(i/3.4+0.06)*W,H-14);}
})();
</script>
</body></html>
