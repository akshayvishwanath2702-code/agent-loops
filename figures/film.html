<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="poster.css">
<style>
  .stage{gap:16px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px}
  .head .l{display:flex;flex-direction:column;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:14px;font-weight:600;padding:8px 15px;border-radius:22px;border:1px solid var(--line-strong);color:var(--muted);background:var(--surface);white-space:nowrap}
  .chip .led{width:9px;height:9px;border-radius:50%;background:var(--amber)}
  .chip.ok{color:var(--green);border-color:color-mix(in oklab,var(--green) 45%,var(--line-strong))}
  .chip.ok .led{background:var(--green)}
  .grid{display:grid;grid-template-columns:1fr 1.2fr;gap:18px;flex:1;align-items:start}
  .gauges{display:flex;flex-direction:column;gap:12px}
  .gauge{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .g-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .g-lab{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .g-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
  .g-val.good{color:var(--green)}
  .bar{height:10px;border-radius:6px;background:var(--panel-2);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:6px;transition:none}
  .console{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.62;height:420px;overflow:hidden}
  .ln{display:flex;gap:11px;padding:1px 0}
  .it{color:var(--faint);width:24px;text-align:right;flex:none}
  .tag{flex:none;width:70px;font-weight:700}
  .obs{color:var(--teal)}.dec{color:var(--amber-ink)}.act{color:var(--amber)}.ver{color:var(--teal-glow)}.gate{color:var(--muted)}.done{color:var(--green)}
  .msg{color:var(--text)}.good{color:var(--green)}
  .cursor{color:var(--amber)}
</style></head>
<body>
<div class="stage">
  <div class="brandbar"></div>
  <div class="head">
    <div class="l"><div class="eyebrow">Live · Songcraft auto-mastering loop</div>
    <h2 class="fig" style="font-size:34px">Goal: master to &minus;14 LUFS. Watch it converge.</h2></div>
    <div class="chip" id="chip"><span class="led"></span><span id="chipt">running</span></div>
  </div>
  <div class="grid">
    <div class="gauges">
      <div class="gauge"><div class="g-top"><span class="g-lab">Integrated loudness</span><span class="g-val" id="lv">&minus;19.2 LUFS</span></div><div class="bar"><i id="lb" style="width:42%;background:var(--teal)"></i></div></div>
      <div class="gauge"><div class="g-top"><span class="g-lab">True peak headroom</span><span class="g-val" id="tv">&minus;6.1 dBTP</span></div><div class="bar"><i id="tb" style="width:100%;background:var(--amber)"></i></div></div>
      <div class="gauge"><div class="g-top"><span class="g-lab">Tonal balance match</span><span class="g-val" id="bv">71%</span></div><div class="bar"><i id="bb" style="width:71%;background:var(--green)"></i></div></div>
      <div class="gauge"><div class="g-top"><span class="g-lab">Pass</span><span class="g-val" id="pv">0 / 12</span></div><div class="bar"><i id="pb" style="width:0%;background:var(--faint)"></i></div></div>
    </div>
    <div class="console" id="con"></div>
  </div>
  <div class="footmark">Stop prompting, start building loops</div>
</div>
<script>
var rows=[
 ["obs","OBSERVE","analyze render → <span style='color:var(--red)'>−19.2 LUFS</span>, peak −6.1, balance 71%",42,100,71,"−19.2 LUFS","−6.1 dBTP","71%",0,0],
 ["dec","DECIDE","quiet, harsh upper-mids vs target curve",42,100,71,"−19.2 LUFS","−6.1 dBTP","71%",0,0],
 ["act","ACT","EQ: −2.5 dB bell @ 3.8 kHz, Q 1.1",42,100,71,"−19.2 LUFS","−6.1 dBTP","71%",0,0],
 ["ver","VERIFY","re-analyze → balance <span class='good'>82%</span>",42,100,82,"−19.2 LUFS","−6.1 dBTP","82%",1,0],
 ["dec","DECIDE","low end reads thin vs target",42,100,82,"−19.2 LUFS","−6.1 dBTP","82%",1,0],
 ["act","ACT","low shelf +1.6 dB @ 90 Hz, multiband glue",42,100,82,"−19.2 LUFS","−6.1 dBTP","82%",1,0],
 ["ver","VERIFY","re-analyze → balance <span class='good'>90%</span>",42,100,90,"−19.2 LUFS","−6.1 dBTP","90%",2,0],
 ["dec","DECIDE","tone right, now raise to −14 LUFS",42,100,90,"−19.2 LUFS","−6.1 dBTP","90%",2,0],
 ["act","ACT","limiter: +4.9 dB, ceiling −1.0 dBTP",42,100,90,"−19.2 LUFS","−6.1 dBTP","90%",2,0],
 ["ver","VERIFY","→ <span class='good'>−14.1 LUFS</span>, peak −1.0, balance 92%",97,98,92,"−14.1 LUFS","−1.0 dBTP","92%",3,0],
 ["dec","DECIDE","limiting added sibilance @ 6.5 kHz",97,98,92,"−14.1 LUFS","−1.0 dBTP","92%",3,0],
 ["act","ACT","de-ess: −1.5 dB @ 6.5 kHz",97,98,92,"−14.1 LUFS","−1.0 dBTP","92%",3,0],
 ["ver","VERIFY","→ <span class='good'>−14.0 LUFS, −1.0 dBTP, 96%</span>",100,100,96,"−14.0 LUFS","−1.0 dBTP","96%",4,1],
 ["gate","GATE","all targets within tolerance ✓",100,100,96,"−14.0 LUFS","−1.0 dBTP","96%",4,1],
 ["done","DONE","MASTERED · no human touched a fader",100,100,96,"−14.0 LUFS","−1.0 dBTP","96%",4,2]
];
var f=parseInt((location.search.match(/f=(\d+)/)||[])[1]||"0",10);
if(f>rows.length-1)f=rows.length-1;
var con=document.getElementById("con");
for(var i=0;i<=f;i++){
  var r=rows[i];
  var d=document.createElement("div");d.className="ln";
  d.innerHTML="<span class='it'>"+String(r[9]).padStart(2,"0")+"</span><span class='tag "+r[0]+"'>"+r[1]+"</span><span class='msg'>"+r[2]+"</span>";
  con.appendChild(d);
}
var cur=rows[f];
function setBar(id,w){document.getElementById(id).style.width=w+"%";}
setBar("lb",cur[3]);setBar("tb",cur[4]);setBar("bb",cur[5]);setBar("pb",cur[9]/12*100);
document.getElementById("lv").innerHTML=cur[6];
document.getElementById("tv").innerHTML=cur[7];
document.getElementById("bv").innerHTML=cur[8];
document.getElementById("pv").textContent=cur[9]+" / 12";
var st=cur[10];
if(st===2){var c=document.getElementById("chip");c.className="chip ok";document.getElementById("chipt").textContent="converged ✓";
  document.getElementById("lv").className="g-val good";document.getElementById("tv").className="g-val good";document.getElementById("bv").className="g-val good";}
</script>
</body></html>
